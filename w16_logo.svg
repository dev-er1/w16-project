<!-- Логотип W16-runtime-а -->
<svg width="400" height="400" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Белый фон -->
  <rect width="100" height="100" fill="white" />

  <!-- Чёрная буква 'W' -->
  <path 
    d="M10 25 L32 80 L50 45 L68 80 L90 25" 
    fill="none" 
    stroke="black" 
    stroke-width="15" 
    stroke-linejoin="bevel" 
    stroke-linecap="square"
  />
  
  <!-- Красное число 16 -->
  <text 
    x="48" 
    y="40" 
    font-family="Arial, sans-serif" 
    font-size="42" 
    font-weight="900" 
    fill="red" 
    text-anchor="middle"
    stroke-width="3"
    paint-order="stroke"
  >16</text>
</svg>
